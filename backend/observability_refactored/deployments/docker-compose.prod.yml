version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: observability
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - observability-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - observability-net

  api:
    image: ${REGISTRY}/observability-api:${TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/observability
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: production
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
    ports:
      - "8000:8000"
    networks:
      - observability-net
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: any

  worker:
    image: ${REGISTRY}/observability-worker:${TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/observability
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WORKER_COUNT: 4
    networks:
      - observability-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - observability-net
    deploy:
      replicas: 2

networks:
  observability-net:
    driver: overlay

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local