services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: observability
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: observability_redis_api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${DB_PASSWORD:-secret}@postgres:5432/observability
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: redis
      APP_ENV: production
    ports:
      - "8000:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 3

  worker:
    build:
      context: ..
      dockerfile: observability_redis_worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${DB_PASSWORD:-secret}@postgres:5432/observability
      REDIS_URL: redis://redis:6379/0
      WORKER_COUNT: 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

volumes:
  postgres_data:
  redis_data: